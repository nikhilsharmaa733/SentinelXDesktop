name: Windows installer

# Builds the Windows .msi and .exe on a GitHub-hosted Windows runner, and — on a
# version tag — publishes them as a public GitHub Release anyone can download.
#
# WHY THIS EXISTS
# jpackage cannot cross-compile — it only builds installers for the OS it runs on.
# The development machine is Linux, so it can produce a .deb but never a Windows
# installer. This workflow rents a Windows machine from GitHub for a few minutes to
# do the one thing the Linux box can't.
#
# HOW TO GET THE FILES
#   • Test build:   Actions tab → "Windows installer" → "Run workflow".
#                   Result lands under the run's "Artifacts" (expires in 90 days,
#                   needs a GitHub login to download).
#   • Public release: push a version tag and it builds AND creates a Release:
#                       git tag v1.0.0
#                       git push origin v1.0.0
#                   The .msi/.exe then live at /releases as permanent public
#                   download links — no login, no expiry (repo must be public).

on:
  workflow_dispatch:        # manual test build → Artifacts only
  push:
    tags:
      - 'v*'                # version tag → build + public Release

permissions:
  contents: write           # required to create a Release and attach the installers

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # A FULL JDK, not a JRE — jpackage ships only with the JDK. Temurin 21 matches
      # the toolchain the project builds against locally.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      # jpackage builds .msi/.exe through the WiX Toolset v3, which is no longer
      # guaranteed to be preinstalled on the runner image. Installing it in its own
      # step means the next step gets a fresh shell with WiX already on PATH — jpackage
      # finds candle.exe / light.exe there. Without this, packageMsi fails at the very
      # end with "Can not find WiX tools".
      - name: Install WiX Toolset v3
        run: choco install wixtoolset --no-progress -y

      - name: Build MSI and EXE
        run: .\gradlew.bat packageMsi packageExe --no-daemon --stacktrace

      # Always available from the run's Artifacts tab — handy for a manual test build
      # before cutting a tagged release.
      - name: Upload installers as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SentinelX-windows-installers
          path: |
            build/compose/binaries/main/msi/*.msi
            build/compose/binaries/main/exe/*.exe
          if-no-files-found: error

      # On a version tag only: publish a public Release with the installers attached.
      # Uses the gh CLI preinstalled on the runner (no third-party action), authed with
      # the automatic GITHUB_TOKEN. Anyone can then download from the Releases page.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $msi = Get-ChildItem build/compose/binaries/main/msi/*.msi
          $exe = Get-ChildItem build/compose/binaries/main/exe/*.exe
          gh release create $env:GITHUB_REF_NAME $msi.FullName $exe.FullName `
            --title "SentinelX $env:GITHUB_REF_NAME" `
            --generate-notes
