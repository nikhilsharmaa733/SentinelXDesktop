name: Windows installer

# Builds the Windows .msi and .exe on a GitHub-hosted Windows runner.
#
# WHY THIS EXISTS
# jpackage cannot cross-compile — it only builds installers for the OS it runs on.
# The development machine is Linux, so it can produce a .deb but never a Windows
# installer. This workflow rents a Windows machine from GitHub for a few minutes to
# do the one thing the Linux box can't.
#
# HOW TO GET THE FILES
#   1. Actions tab → "Windows installer" → "Run workflow"  (manual build)
#      …or push a tag like v1.0.0, which triggers it automatically.
#   2. When it finishes, open the run → "Artifacts" → download
#      "SentinelX-windows-installers" (a zip with the .msi and .exe inside).

on:
  workflow_dispatch:        # build on demand from the Actions tab
  push:
    tags:
      - 'v*'                # …and automatically on a version tag (v1.0.0, v1.1.0, …)

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # A FULL JDK, not a JRE — jpackage ships only with the JDK. Temurin 21 matches
      # the toolchain the project builds against locally.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      # jpackage builds .msi/.exe through the WiX Toolset v3, which is no longer
      # guaranteed to be preinstalled on the runner image. Installing it in its own
      # step means the next step gets a fresh shell with WiX already on PATH — jpackage
      # finds candle.exe / light.exe there. Without this, packageMsi fails at the very
      # end with "Can not find WiX tools".
      - name: Install WiX Toolset v3
        run: choco install wixtoolset --no-progress -y

      - name: Build MSI and EXE
        run: .\gradlew.bat packageMsi packageExe --no-daemon --stacktrace

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: SentinelX-windows-installers
          path: |
            build/compose/binaries/main/msi/*.msi
            build/compose/binaries/main/exe/*.exe
          if-no-files-found: error
